<html lang="cs">
<head>

        html, body {
            /* Hide scrollbars but keep scrolling functional */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #pdf-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px; /* No gaps to look seamless, or small premium gaps */
        }

        .pdf-page-wrapper {
            position: relative;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Loading indicator */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Ambient background glow */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Načítání PDF prezentace...</div>
    </div>

    <div id="pdf-container"></div>

    <script>
        // Tell PDF.js where the worker is located
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const url = 'Untitled.pdf';
        const container = document.getElementById('pdf-container');
        const loader = document.getElementById('loader');

        // Load the PDF document
        pdfjsLib.getDocument(url).promise.then(pdf => {
            console.log('PDF loaded, total pages:', pdf.numPages);
            
            let pagesRendered = 0;
            const totalPages = pdf.numPages;

            // Render all pages
            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                // Create wrapper for full screen slide experience
                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                
                // Add glowing background
                const glow = document.createElement('div');
                glow.className = 'glow';
                wrapper.appendChild(glow);

                const canvas = document.createElement('canvas');
                wrapper.appendChild(canvas);
                container.appendChild(wrapper);

                renderPage(pdf, pageNum, canvas, () => {
                    pagesRendered++;
                    if (pagesRendered === totalPages) {
                        // Hide loader once all pages are rendered
                        loader.style.opacity = 0;
                        setTimeout(() => {
                            loader.style.visibility = 'hidden';
                        }, 500);
                    }
                });
            }
        }).catch(err => {
            console.error('Chyba při načítání PDF:', err);
            document.querySelector('.loading-text').innerText = 'Chyba při načítání PDF. Ujistěte se, že soubor "Untitled.pdf" existuje v tomto adresáři.';
            document.querySelector('.spinner').style.borderTopColor = '#ef4444';
        });

        function renderPage(pdf, pageNum, canvas, callback) {
            pdf.getPage(pageNum).then(page => {
                const ctx = canvas.getContext('2d');
                
                // Calculate scale to fit width
                const viewport = page.getPageViewport ? page.getPageViewport({ scale: 1.0 }) : page.getViewport({ scale: 1.0 });
                const windowWidth = window.innerWidth;
                const scale = windowWidth / viewport.width;
                
                const scaledViewport = page.getViewport({ scale: scale });
                
                // Set high DPI canvas backing store if needed (optional, scale 1.5-2 for crispness)
                const dpr = window.devicePixelRatio || 1;
                canvas.width = scaledViewport.width * dpr;
                canvas.height = scaledViewport.height * dpr;
                canvas.style.width = `${scaledViewport.width}px`;
                canvas.style.height = `${scaledViewport.height}px`;
                
                ctx.scale(dpr, dpr);

                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };
                
                page.render(renderContext).promise.then(() => {
                    callback();
                });
            });
        }

        // Re-render on resize to maintain full screen fit
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                location.reload(); // Quickest and cleanest way to recalculate all pages for fullscreen
            }, 300);
        });
    </script>

<!-- Page Transition Overlay -->
<div id="page-transition-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: auto; z-index: 999999; display: flex; justify-content: center; align-items: center; background-color: #ffffff; transition: background-color 0.8s ease;">
    <div id="page-transition-flower" style="width: 100px; height: 100px; background-image: url('kytka_blue.svg'); background-size: contain; background-position: center; background-repeat: no-repeat; transform: scale(10); opacity: 1; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.3s ease;"></div>
</div>

<script>
    window.triggerPageTransition = function(url) {
        const overlay = document.getElementById('page-transition-overlay');
        const flower = document.getElementById('page-transition-flower');
        if(!overlay || !flower) {
            window.location.href = url;
            return;
        }
        
        flower.style.transition = 'transform 0.8s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.4s ease';
        overlay.style.transition = 'background-color 0.8s ease';
        
        overlay.style.pointerEvents = 'auto';
        overlay.style.backgroundColor = '#ffffff';
        flower.style.opacity = '1';
        flower.style.transform = 'scale(10)';
        
        setTimeout(() => {
            window.location.href = url;
        }, 800);
    };

    document.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('page-transition-overlay');
        const flower = document.getElementById('page-transition-flower');
        
        if (overlay && flower) {
            void flower.offsetWidth; // force reflow
            
            overlay.style.transition = 'background-color 0.6s ease 0.4s';
            flower.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease';
            
            requestAnimationFrame(() => {
                overlay.style.backgroundColor = 'transparent';
                flower.style.transform = 'scale(0)';
                flower.style.opacity = '0';
                
                setTimeout(() => {
                    overlay.style.pointerEvents = 'none';
                }, 1000);
            });
        }

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                const target = link.getAttribute('href');
                const isNewTab = link.getAttribute('target') === '_blank' || e.ctrlKey || e.metaKey || e.shiftKey;
                if (target && !isNewTab && !target.startsWith('#') && !target.startsWith('mailto:') && !target.startsWith('javascript:')) {
                    e.preventDefault();
                    window.triggerPageTransition(target);
                }
            });
        });
    });
</script>
