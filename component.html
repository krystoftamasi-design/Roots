<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktivní Element — Kořeny</title>
    <!-- Google Fonts: Plus Jakarta Sans for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            /* Light Theme (Default for the element) */
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #18191b;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
            --accent-color: #000000;
            --accent-glow: rgba(0, 0, 0, 0.05);
            --svg-fill: #000000;

            /* Component Specific variables */
            --comp-spacing: 0.8rem;
            --comp-photo-size: 420px;
            --comp-svg-scale: 1.45;
        }

        /* Dark Theme modifier */
        [data-theme="dark"] {
            --bg-color: #0a0a0c;
            --card-bg: #111115;
            --text-main: #f1f3f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.08);
            --svg-fill: #ffffff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj4gPGcgdHJhbnNmb3JtPSJ0cmFuc2xhdGUoMjAsIDIwKSByb3RhdGUoLTQ1KSBzY2FsZSgyLjcpIHRyYW5zbGF0ZSgtMzIuNDQzLCAtMjEuNDcxKSI+IDxwYXRoIGQ9Ik0zOC42NjEsMjYuNDg1QzM4LjI2OCwyNy4wMTYgMzcuMjUyLDI2Ljc1OCAzNS45ODksMjUuODQ1QzM0LjY3NiwyNC44OTUgMzMuODk4LDIzLjg2MiAzMy40MjIsMjIuNjcxQzMzLjI4NSwyMi4zMyAzMy4wNDUsMjIuMDQyIDMyLjcyNywyMS44NTZMMzIuNDQzLDIxLjY5TDMyLjE1OSwyMS44NTZDMzEuODQxLDIyLjA0MiAzMS42MDEsMjIuMzMgMzEuNDY1LDIyLjY3MUMzMC45ODgsMjMuODU5IDMwLjIxLDI0Ljg5MyAyOC44OTcsMjUuODQ1QzI3LjYzNiwyNi43NTggMjYuNjE4LDI3LjAxNiAyNi4yMjYsMjYuNDg1QzI1LjcxOSwyNS43OTcgMjUuNjA2LDI0LjIwMiAyNi43NDEsMjMuMzgxQzI3LjUwMiwyMi44MzEgMjguNzY5LDIyLjMzNSAzMC42MzQsMjEuNjUzQzMwLjg3NiwyMS41NjQgMzEuMDk2LDIxLjQxOSAzMS4yNzMsMjEuMjI5TDMyLjM5OSwyMC4wMTlMMzMuNjA5LDIxLjIyOUMzMy43ODUsMjEuNDE3IDM0LjAwNiwyMS41NjQgMzQuMjQ4LDIxLjY1M0MzNi4xMTMsMjIuMzM1IDM3LjM4LDIyLjgzMSAzOC4xNDEsMjMuMzgxQzM5LjI3NiwyNC4yMDIgMzkuMTYzLDI1Ljc5OSAzOC42NTYsMjYuNDg1TDM4LjY2MSwyNi40ODVaIiBzdHlsZT0iZmlsbDpyZ2IoMjU1LDMwLDApO2ZpbGwtcnVsZTpub256ZXJvOyIvPiA8L2c+PC9zdmc+') 17 17, default !important;
        }

        html, body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;             /* Chrome, Safari and Opera */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 1.5rem;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 50vh;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: -1;
            filter: blur(40px);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            max-width: 600px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
        }

        /* Controls Panel */
        .controls-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Premium Toggle Switch button */
        .toggle-btn {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s ease;
            outline: none;
        }

        .toggle-btn:hover {
            border-color: var(--accent-color);
            background-color: var(--card-bg);
        }

        .toggle-btn.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        /* Divider inside controls */
        .divider {
            width: 1px;
            height: 20px;
            background-color: var(--border-color);
        }

        /* Sliders Panel */
        .sliders-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 850px;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01);
            transition: all 0.3s ease;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .slider-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .slider-group label span {
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-color);
            outline: none;
            transition: background 0.3s ease;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        /* --- PREVIEW WORKSPACE --- */
        .preview-workspace {
            width: 100%;
            max-width: 850px;
            min-height: 400px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
            margin-bottom: 3.5rem;
            position: relative;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        /* ========================================================
           THE ART COMPONENT CORE STYLES
           ======================================================== */

        /* Parent Container */
        .art-element {
            display: grid;
            grid-template-areas: "text visual";
            align-items: center;
            justify-content: center;
            gap: var(--comp-spacing);
            user-select: none;
        }

        /* Layout modifications */
        .art-element.layout-left {
            grid-template-areas: "text visual";
            /* Text Left, Image Right */
        }

        .art-element.layout-right {
            grid-template-areas: "visual text";
            /* Text Right, Image Left */
        }

        /* Circle Photo */
        .art-photo {
            grid-area: visual;
            position: relative;
            width: var(--comp-photo-size);
            height: var(--comp-photo-size);
            object-fit: cover;
            border-radius: 50%;
            z-index: 2;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            align-self: center;
            justify-self: center;
        }

        .art-element:hover .art-photo {
            transform: scale(1.02);
        }

        /* SVG Background Container */
        .art-svg-background {
            grid-area: visual;
            width: calc(var(--comp-photo-size) * var(--comp-svg-scale));
            height: calc(var(--comp-photo-size) * var(--comp-svg-scale));
            z-index: 1;
            pointer-events: none;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            justify-self: center;
        }

        /* SVG Inner Animator (Pulse position keeper) */
        .art-svg-pulse {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
        }

        /* Inline SVG styling */
        .art-svg-background svg {
            width: 100%;
            height: 100%;
            fill: var(--svg-fill);
            transition: fill 0.4s ease;
        }

        /* ==============================================
           INTERACTIVE HOVER BEHAVIOR
           ============================================== */

        /* 2. TEXT SECTION CONTAINER */
        .art-text-container {
            grid-area: text;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            transition: transform 0.3s ease;
        }

        /* Interactive Dot next to text */
        .art-indicator-dot {
            width: 14px;
            height: 14px;
            background-color: var(--accent-color);
            border-radius: 50%;
            flex-shrink: 0;
            display: inline-block;
            transition: background-color 0.4s ease, transform 0.3s ease;
        }

        /* Micro animation for the dot on hover */
        .art-element:hover .art-indicator-dot {
            transform: scale(1.25);
        }

        /* Text lines container */
        .art-text-lines {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .art-title {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.01em;
            color: var(--text-main);
        }

        .art-subtitle {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.3;
            color: var(--text-main);
            margin-top: 0.15rem;
        }

        .art-author {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.3;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        /* Responsive collapse on smaller displays */
        @media (max-width: 650px) {
            .controls-panel {
                flex-direction: column;
                border-radius: 20px;
                padding: 1.2rem;
                gap: 1rem;
                width: 100%;
                max-width: 350px;
                align-items: stretch;
            }

            .control-group {
                justify-content: space-between;
            }

            .divider {
                display: none;
            }

            .art-element,
            .art-element.layout-left,
            .art-element.layout-right {
                display: flex;
                flex-direction: column-reverse;
                gap: 3rem;
                text-align: center;
            }

            .art-text-container {
                display: flex;
                flex-direction: column;
                gap: 0.6rem;
            }

            .art-text-lines {
                text-align: center;
            }
        }

        /* ========================================================
           CODE CODE SHOWCASE & COPY MODULE
           ======================================================== */

        .code-showcase {
            width: 100%;
            max-width: 850px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.01);
            transition: all 0.3s ease;
        }

        .showcase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.01);
        }

        .tab-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .copy-btn {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 0.5rem 1.1rem;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .copy-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .code-container {
            padding: 1.5rem;
            margin: 0;
            overflow-x: auto;
            max-height: 450px;
        }

        pre {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        .code-panel {
            display: none;
        }

        .code-panel.active {
            display: block;
        }

        /* SVG icon style */
        .icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <div class="ambient-glow"></div>

    <header>
        <h1>Interaktivní Grafický Element</h1>
        <p>Prezentace nového animovaného bloku s pulzujícím SVG pozadím a textem. Vyberte si uspořádání a zkopírujte
            kód.</p>
    </header>

    <!-- Controls Panel -->
    <div class="controls-panel">
        <div class="control-group">
            <span class="control-label">Pozice textu:</span>
            <button class="toggle-btn active" id="layout-left-btn" onclick="setLayout('left')">Vlevo</button>
            <button class="toggle-btn" id="layout-right-btn" onclick="setLayout('right')">Vpravo</button>
        </div>
        <div class="divider"></div>
        <div class="control-group">
            <span class="control-label">Motiv:</span>
            <button class="toggle-btn active" id="theme-light-btn" onclick="setTheme('light')">Světlý</button>
            <button class="toggle-btn" id="theme-dark-btn" onclick="setTheme('dark')">Tmavý</button>
        </div>
        <div class="divider"></div>
        <div class="control-group">
            <button class="toggle-btn" id="export-btn" onclick="exportSettings()"
                style="background-color: var(--accent-color); color: var(--bg-color); border-color: var(--accent-color); font-weight: 600;">Exportovat
                do Galerie</button>
        </div>
    </div>

    <!-- Sliders Panel -->
    <div class="sliders-panel">
        <div class="slider-group">
            <label for="scale-slider">Základní velikost (base scale): <span id="scale-val">1.45</span>x</label>
            <input type="range" id="scale-slider" min="1.0" max="2.0" step="0.05" value="1.45"
                oninput="updateSvgScale(this.value)">
        </div>
        <div class="slider-group">
            <label for="pulse-slider">Max. velikost cyklu (max scale): <span id="pulse-val">1.05</span>x</label>
            <input type="range" id="pulse-slider" min="1.0" max="1.25" step="0.01" value="1.05"
                oninput="updateSvgPulse(this.value)">
        </div>
        <div class="slider-group">
            <label for="pulse-duration-slider">Doba cyklu dýchání (speed/duration): <span
                    id="pulse-duration-val">4.5</span>s</label>
            <input type="range" id="pulse-duration-slider" min="1.0" max="10.0" step="0.5" value="4.5"
                oninput="updatePulseDuration(this.value)">
        </div>
        <div class="slider-group">
            <label for="hover-slider">Velikost při hoveru (hover scale): <span id="hover-val">1.22</span>x</label>
            <input type="range" id="hover-slider" min="1.0" max="2.5" step="0.05" value="1.22"
                oninput="updateSvgHover(this.value)">
        </div>
        <div class="slider-group">
            <label for="hover-speed-slider">Rychlost růstu (hover grow): <span id="hover-speed-val">4.0</span></label>
            <input type="range" id="hover-speed-slider" min="1.0" max="10.0" step="0.5" value="4.0"
                oninput="updateHoverSpeed(this.value)">
        </div>
        <div class="slider-group">
            <label for="return-speed-slider">Rychlost návratu (slow return): <span
                    id="return-speed-val">1.5</span></label>
            <input type="range" id="return-speed-slider" min="0.2" max="5.0" step="0.1" value="1.5"
                oninput="updateReturnSpeed(this.value)">
        </div>
    </div>

    <!-- Preview Workspace -->
    <div class="preview-workspace">

        <!-- THE COMPONENT -->
        <div class="art-element layout-left" id="interactive-element">

            <!-- Text container (Left/Right) -->
            <div class="art-text-container">
                <span class="art-indicator-dot"></span>
                <div class="art-text-lines">
                    <span class="art-title">Lůno</span>
                    <span class="art-subtitle">Barborky</span>
                    <span class="art-author">Ondřej Muroň</span>
                </div>
            </div>

            <!-- Visual interactive block -->
            <div class="art-svg-background">

            pulseDuration: 4.5

        // State variables for animation loop
        let state = 'pulsing'; // 'pulsing', 'hovering', 'returning'
        let relativeScale = 1.0;
        let phase = 0.0;
        let lastTime = performance.now();

        const element = document.getElementById('interactive-element');
        const svgBg = document.querySelector('.art-svg-background');

        // Setup mouse listeners for interactive state tracking
        if (element && svgBg) {
            element.addEventListener('mouseenter', () => {
                state = 'hovering';
            });

            element.addEventListener('mouseleave', () => {
                state = 'returning';
            });

            // Frame-rate independent animation loop
            function animate(currentTime) {
                let dt = (currentTime - lastTime) / 1000.0;
                if (dt > 0.1) dt = 0.1; // Cap time step
                lastTime = currentTime;

                const amplitude = config.pulseMax - 1.0;

                if (state === 'pulsing') {
                    // Breathing loop: adjustable pulse duration (seconds) per full cycle
                    phase += (2 * Math.PI / config.pulseDuration) * dt;
                    relativeScale = 1.0 + amplitude * Math.sin(phase);
                } else if (state === 'hovering') {
                    // Grow to target hoverScale from current scale
                    relativeScale += (config.hoverScale - relativeScale) * (1.0 - Math.exp(-config.hoverSpeed * dt));
                } else if (state === 'returning') {
                    // Slower return to the minimum pulse scale (1.0 - amplitude)
                    const target = 1.0 - amplitude;
                    relativeScale += (target - relativeScale) * (1.0 - Math.exp(-config.returnSpeed * dt));

                    // Once we reach the minimum of the pulse cycle, return back to the normal pulsing loop
                    if (Math.abs(relativeScale - target) < 0.001) {
                        relativeScale = target;
                        state = 'pulsing';
                        phase = -Math.PI / 2.0; // Reset phase precisely to the sine wave minimum (-90deg)
                    }
                }

                // Total scale = base scale * relative scale
                const totalScale = config.baseScale * relativeScale;
                svgBg.style.transform = `scale(${totalScale})`;

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);

            if (state === 'pulsing') {

    </script>

<!-- Page Transition Overlay -->
<div id="page-transition-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: auto; z-index: 999999; display: flex; justify-content: center; align-items: center; background-color: #ffffff; transition: background-color 0.8s ease;">
    <div id="page-transition-flower" style="width: 100px; height: 100px; background-image: url('kytka_blue.svg'); background-size: contain; background-position: center; background-repeat: no-repeat; transform: scale(10); opacity: 1; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.3s ease;"></div>
</div>

<script>
    window.triggerPageTransition = function(url) {
        const overlay = document.getElementById('page-transition-overlay');
        const flower = document.getElementById('page-transition-flower');
        if(!overlay || !flower) {
            window.location.href = url;
            return;
        }
        
        flower.style.transition = 'transform 0.8s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.4s ease';
        overlay.style.transition = 'background-color 0.8s ease';
        
        overlay.style.pointerEvents = 'auto';
        overlay.style.backgroundColor = '#ffffff';
        flower.style.opacity = '1';
        flower.style.transform = 'scale(10)';
        
        setTimeout(() => {
            window.location.href = url;
        }, 800);
    };

    document.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('page-transition-overlay');
        const flower = document.getElementById('page-transition-flower');
        
        if (overlay && flower) {
            void flower.offsetWidth; // force reflow
            
            overlay.style.transition = 'background-color 0.6s ease 0.4s';
            flower.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease';
            
            requestAnimationFrame(() => {
                overlay.style.backgroundColor = 'transparent';
                flower.style.transform = 'scale(0)';
                flower.style.opacity = '0';
                
                setTimeout(() => {
                    overlay.style.pointerEvents = 'none';
                }, 1000);
            });
        }

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                const target = link.getAttribute('href');
                const isNewTab = link.getAttribute('target') === '_blank' || e.ctrlKey || e.metaKey || e.shiftKey;
                if (target && !isNewTab && !target.startsWith('#') && !target.startsWith('mailto:') && !target.startsWith('javascript:')) {
                    e.preventDefault();
                    window.triggerPageTransition(target);
                }
            });
        });
    });
</script>
