        /* Ambient glows scattered in background */
        .glow-point {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.015) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: -1;
            filter: blur(50px);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            text-align: center;
            margin-bottom: 6rem;
            max-width: 700px;
            z-index: 10;
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            /* Regular */
            font-size: 3rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        header p {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            /* Regular */
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 0.05em;
            line-height: 1.6;
        }

        /* Scattered Gallery Wrapper */
        #gallery {
            width: 95vw;
            max-width: 1800px;
            position: relative;
            min-height: 4800px;
            /* space for absolute scattered positioning */
            margin-bottom: 6rem;
        }

        /* Custom Settings Indicator Bar */
        #custom-settings-indicator {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        #custom-settings-indicator button {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: inherit;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        #custom-settings-indicator button:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* THE COMPONENT STYLES */
        .art-element {
            display: grid;
            grid-template-areas: "text visual";
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            user-select: none;
            position: relative;
        }

        /* Layout direction modifiers */
        .art-element.layout-left {
            grid-template-areas: "text visual";
        }

        .art-element.layout-right {
            grid-template-areas: "visual text";
        }

        /* Circle Photo */
        .art-photo {
            grid-area: visual;
            position: relative;
            width: var(--comp-photo-size);
            height: var(--comp-photo-size);
            object-fit: cover;
            border-radius: 50%;
            z-index: 2;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            align-self: center;
            justify-self: center;
        }

        .art-element:hover .art-photo {
            transform: scale(1.02);
        }

        /* SVG Background Container */
        .art-svg-background {
            grid-area: visual;
            width: calc(var(--comp-photo-size) * 1.45);
            height: calc(var(--comp-photo-size) * 1.45);
            z-index: 1;
            pointer-events: none;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            justify-self: center;
        }

        .art-svg-pulse {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
        }

        .art-svg-background svg {
            width: 100%;
            height: 100%;
            fill: var(--svg-fill);
            opacity: 0.65;
            transition: fill 0.4s ease, opacity 0.4s ease;
        }

        .art-element:hover svg {
            opacity: 0.95;
        }

        /* 2. TEXT SECTION CONTAINER */
        .art-text-container {
            grid-area: text;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            transition: transform 0.3s ease;
        }

        /* Indicator dot (Pulsing micro-dot) */
        .art-indicator-dot {
            width: 10px;
            height: 10px;
            background-color: var(--text-main);
            border-radius: 50%;
            flex-shrink: 0;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .art-element:hover .art-indicator-dot {
            transform: scale(1.3);
        }

        /* Text lines: all styled as Montserrat Regular (400) */
        .art-text-lines {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .art-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.95rem;
            line-height: 1.3;
            letter-spacing: 0.05em;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .art-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.95rem;
            line-height: 1.3;
            letter-spacing: 0.03em;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .art-author {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.95rem;
            line-height: 1.3;
            letter-spacing: 0.03em;
            color: rgba(0, 0, 0, 0.4);
            margin-top: 0.15rem;
        }

        /* Footer styling */
        footer {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            margin-top: auto;
            color: rgba(0, 0, 0, 0.3);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Responsive collapse on smaller displays */
        @media (max-width: 768px) {
            #gallery {
                min-height: auto !important;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5rem;
                padding-bottom: 5rem;
            }

            .art-element,
            .art-element.layout-left,
            .art-element.layout-right {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                margin: 0 auto !important;
                display: flex;
                flex-direction: column-reverse;
                gap: 2.5rem;
                text-align: center;
            }

            .art-text-container {
                display: flex;
                flex-direction: column;
                gap: 0.6rem;
            }

            .art-text-lines {
                text-align: center;
            }
        }
    </style>
</head>

    <script>
        // Check for custom settings exported from component.html
        let customSettings = null;
        try {
            const saved = localStorage.getItem('koreny_gallery_settings');
            if (saved) {

                document.getElementById('custom-settings-indicator').style.display = 'flex';
            }
        } catch (e) {
            console.error("Failed to load customizer settings", e);
        }

        window.resetCustomSettings = function () {
            localStorage.removeItem('koreny_gallery_settings');
            window.location.reload();
        };

        // Word pool to generate unique combinations of art pieces
        const poolTitles = ["Lůno", "Země", "Hlína", "Stín", "Křivka", "Dotek", "Ticho", "Popel", "Plamen", "Tvar", "Ozvěna", "Otisk", "Hlubina", "Vlna", "Pohyb", "Prostor", "Světlo", "Čas", "Návrat", "Zrod"];
        const poolSubtitles = ["Barborky", "Prvoky", "Fragmenty", "Prameny", "Siluety", "Stopy", "Věky", "Kořeny", "Obrysy", "Odstíny"];
        const poolAuthors = ["Ondřej Muroň", "Krystian M.", "Jan Novák", "Kateřina Š."];

        const gallery = document.getElementById('gallery');
        const elementsData = [];

        // Inline SVG template string

        let elementIdx = 0;
        let rowIndex = 0;
        const rowHeight = 720;
        const verticalOffsetRange = 80;

        while (elementIdx < 20) {
            // Decide how many elements in this row: 1, 2, or 3
            const rand = Math.random();
            let countInRow = 2;
            if (rand < 0.25) {
                countInRow = 1;
            } else if (rand < 0.65) {
                countInRow = 2;
            } else {
                countInRow = 3;
            }

                countInRow = 20 - elementIdx;
            }

            for (let j = 0; j < countInRow; j++) {
                const title = poolTitles[elementIdx % poolTitles.length];
                const subtitle = poolSubtitles[Math.floor(Math.random() * poolSubtitles.length)];

                const top = rowIndex * rowHeight + 100 + Math.floor(Math.random() * verticalOffsetRange);

                let left = 0;
                if (countInRow === 1) {
                    left = 25 + Math.floor(Math.random() * 20); // 25% to 45%
                } else if (countInRow === 2) {
                    if (j === 0) {
                        left = 5 + Math.floor(Math.random() * 15); // 5% to 20%
                    } else {
                        left = 52 + Math.floor(Math.random() * 15); // 52% to 67%
                    }
                } else {
                    if (j === 0) {
                        left = 0 + Math.floor(Math.random() * 6); // 0% to 6%
                    } else if (j === 1) {
                        left = 34 + Math.floor(Math.random() * 6); // 34% to 40%
                    } else {
                        left = 68 + Math.floor(Math.random() * 6); // 68% to 74%
                    }
                }

                // Build element block with absolute coordinates (no art-visual-container wrapper)
                const elHtml = `
                <div class="art-element ${layoutDirection}" id="art-el-${elementIdx}" style="position: absolute; top: ${top}px; left: ${left}%;">
                    <div class="art-text-container">
                        <span class="art-indicator-dot"></span>
                        <div class="art-text-lines">
                            <span class="art-title">${title}</span>
                            <span class="art-subtitle">${subtitle}</span>
                            <span class="art-author">${author}</span>
                        </div>
                    </div>
                    <div class="art-svg-background">
                        <div class="art-svg-pulse">
                            ${svgContent}
                        </div>
                    </div>
                    <img src="grafika/circlephoto.png" class="art-photo" alt="${title} - ${subtitle}">
                </div>`;

                gallery.insertAdjacentHTML('beforeend', elHtml);

                // Fetch the generated element and its children to map configuration
                const elDom = document.getElementById(`art-el-${elementIdx}`);
                const svgBg = elDom.querySelector('.art-svg-background');

                // Set configuration (use custom exported values or random defaults)
                let config;
                if (customSettings) {
                    config = {
                        baseScale: customSettings.baseScale,
                        pulseMax: customSettings.pulseMax,
                        pulseDuration: customSettings.pulseDuration,
                        hoverScale: customSettings.hoverScale,
                        hoverSpeed: customSettings.hoverSpeed,
                        returnSpeed: customSettings.returnSpeed
                    };
                } else {
                    config = {
                        baseScale: 1.15 + Math.random() * 0.3,       // 1.15 to 1.45
                        pulseMax: 1.04 + Math.random() * 0.04,        // 1.04 to 1.08
                        pulseDuration: 3.5 + Math.random() * 2.5,     // 3.5s to 6.0s (cycle duration)
                        hoverScale: 1.25 + Math.random() * 0.15,      // 1.25 to 1.40
                        hoverSpeed: 3.0 + Math.random() * 2.5,        // Grow lerp speed (3.0 to 5.5)
                        returnSpeed: 1.2 + Math.random() * 1.0        // Return lerp speed (1.2 to 2.2)
                    };
                }

                const data = {
                    el: elDom,
                    svgBg: svgBg,
                    config: config,
                    state: 'pulsing', // 'pulsing', 'hovering', 'returning'
                    relativeScale: 1.0,
                    phase: Math.random() * Math.PI * 2 // Randomized starting phase (out-of-sync breathing)
                };

                // Setup listeners for individual hover state machine tracking
                elDom.addEventListener('mouseenter', () => {
                    data.state = 'hovering';
                });

                elDom.addEventListener('mouseleave', () => {
                    data.state = 'returning';
                });

                elementsData.push(data);
                elementIdx++;
            }
            rowIndex++;
        }

        // Set dynamic height for absolute positioning container based on row count
        gallery.style.height = (rowIndex * rowHeight + 200) + 'px';

        // Global animation loop driving all 20 elements with frame-independent math
        let lastTime = performance.now();

        function animate(currentTime) {
            let dt = (currentTime - lastTime) / 1000.0;
            if (dt > 0.1) dt = 0.1; // Cap time step
            lastTime = currentTime;

            elementsData.forEach(item => {
                const amplitude = item.config.pulseMax - 1.0;

                if (item.state === 'pulsing') {
                    // Out-of-sync breathing pulse using the element's custom duration
                    item.phase += (2 * Math.PI / item.config.pulseDuration) * dt;
                    item.relativeScale = 1.0 + amplitude * Math.sin(item.phase);
                } else if (item.state === 'hovering') {
                    // Grow to target hoverScale from current scale
                    item.relativeScale += (item.config.hoverScale - item.relativeScale) * (1.0 - Math.exp(-item.config.hoverSpeed * dt));
                } else if (item.state === 'returning') {
                    // Shrink slowly back to the minimum pulse scale
                    const target = 1.0 - amplitude;
                    item.relativeScale += (target - item.relativeScale) * (1.0 - Math.exp(-item.config.returnSpeed * dt));

                    // Once reached, transition back to the breathing loop cleanly
                    if (Math.abs(item.relativeScale - target) < 0.0015) {
                        item.relativeScale = target;
                        item.state = 'pulsing';
                        item.phase = -Math.PI / 2.0; // Reset phase to minimum of sine wave (-90deg)
                    }
                }

                // Apply total scale (centered automatically by Grid layout)
                const totalScale = item.config.baseScale * item.relativeScale;
                item.svgBg.style.transform = `scale(${totalScale})`;
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

        // Smooth parallax effect for ambient background glow points
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 45;
            const y = (e.clientY / window.innerHeight - 0.5) * 45;
            const glows = document.querySelectorAll('.glow-point');
            glows.forEach((glow, idx) => {
                const speed = (idx + 1) * 0.4;
                glow.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>

</html>
